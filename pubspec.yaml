name: thix_id
description: "THIX ID - Une identité numérique sécurisée"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Core
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.2
  go_router: ^17.3.0
  fl_chart: ^1.2.0

  # Backend
  supabase_flutter: ^2.14.1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  firebase_storage: ^13.4.2

  # Utils & Storage
  http: ^1.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Media & Communication
  video_player: ^2.9.2
  agora_rtc_engine: ^6.3.0
  record: ^7.0.0

  # Identification & Scanning
  geolocator: ^14.0.2
  nfc_manager: ^4.0.0
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.0

  # Notifications & Sharing
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.0
  share_plus: ^13.1.0

  # Files & PDF
  file_picker: ^12.0.0-beta.5
  printing: ^5.13.0
  pdf: ^3.11.0

  # Security & Others
  crypto: ^3.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/dreamflow_icon.jpg"
  remove_alpha_ios: true
